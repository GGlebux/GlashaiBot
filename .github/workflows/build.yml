name: build-and-push

# Собирает образ и пушит в Docker Hub.
# На сервере Watchtower увидит свежий образ и сам обновит контейнеры.
#
# Нужны секреты репозитория:
#   DOCKERHUB_USERNAME — логин Docker Hub
#   DOCKERHUB_TOKEN    — access token Docker Hub (Account Settings → Security)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    # Секреты DOCKERHUB_* лежат в этом окружении (а не в Repository secrets).
    environment: "DockerHub env"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Проверка секретов Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "::error::Секреты DOCKERHUB_USERNAME/DOCKERHUB_TOKEN пусты или не заданы."
            echo "Добавь их в: Settings -> Secrets and variables -> Actions ->"
            echo "вкладка Secrets -> Repository secrets (НЕ Variables, НЕ Environment, НЕ Dependabot)."
            exit 1
          fi
          echo "OK: оба секрета на месте (DOCKERHUB_USERNAME и DOCKERHUB_TOKEN)."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/glashatai
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
