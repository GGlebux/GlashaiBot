# Прод-стек «Глашатай». Берёт готовый образ из Docker Hub.
# Поднять всё:  docker compose up -d
#
# Образ задаётся переменной DOCKER_IMAGE в .env, напр.:
#   DOCKER_IMAGE=yourdockerhubuser/glashatai:latest

# Фиксированное имя проекта (папка может быть на кириллице — тогда compose
# не может вывести имя сам).
name: glashatai

x-app: &app
  image: ${DOCKER_IMAGE:-glashatai:latest}
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  bot:
    <<: *app
    command: python -m app.bot.main

  worker:
    <<: *app
    command: python -m app.worker.run

  admin:
    <<: *app
    command: uvicorn app.admin.main:app --host 0.0.0.0 --port ${ADMIN_PORT:-8080}
    # Наружу не публикуем — доступ только через Caddy (HTTPS). Внутри сети
    # сервисы видят admin по имени (admin:8080).
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:${ADMIN_PORT:-8080}/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Reverse-proxy с авто-HTTPS (Let's Encrypt). Требует домен в DOMAIN и
  # открытые порты 80/443 на сервере. Без домена админка недоступна, но бот
  # работает — Caddy на бота никак не влияет.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - admin

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # Авто-деплой: следит за Docker Hub и обновляет контейнеры при новом образе.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      # Свежий Docker-демон отвергает старый клиент watchtower (API 1.25):
      # форсируем поддерживаемую версию API.
      DOCKER_API_VERSION: "1.44"
      # Для приватного репозитория Docker Hub раскомментируй:
      # REPO_USER: ${DOCKERHUB_USERNAME}
      # REPO_PASS: ${DOCKERHUB_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --interval 300

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
